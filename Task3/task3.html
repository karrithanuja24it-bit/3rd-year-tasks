<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#d4f4d2,#ffffff,#d4f4d2);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:450px;
    background:#fff;
    padding:20px;
    border:3px solid #4CAF50;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#2e7d32;
    margin-bottom:18px;
    font-size:28px;
}

.form-group{
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:16px;
    font-weight:bold;
    color:#2e7d32;
}

input,
select{
    width:100%;
    height:40px;
    padding:8px;
    border:2px solid #81c784;
    border-radius:8px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2e7d32;
}

.gender{
    display:flex;
    gap:25px;
    margin-top:5px;
}

.gender label{
    display:flex;
    align-items:center;
    gap:5px;
    color:black;
    font-weight:normal;
    font-size:15px;
}

.gender input{
    width:auto;
    height:auto;
}

button{
    width:100%;
    padding:10px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:25px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

.error{
    color:red;
    font-size:13px;
    margin-top:3px;
}

.success{
    color:green;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    margin-top:12px;
}

@media(max-width:500px){

.container{
    width:100%;
}

.gender{
    flex-direction:column;
    gap:10px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Student Registration Form</h2>

<form id="regForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>
</div>

<div class="form-group">
<label>Roll Number</label>
<input type="text" id="roll">
<div class="error" id="rollError"></div>
</div>

<div class="form-group">
<label>Email ID</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="text" id="mobile">
<div class="error" id="mobileError"></div>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>
</div>

<div class="form-group">
<label>Gender</label>

<div class="gender">

<label>
<input type="radio" name="gender" value="Male">
Male
</label>

<label>
<input type="radio" name="gender" value="Female">
Female
</label>

</div>

<div class="error" id="genderError"></div>

</div>

<div class="form-group">
<label>Department</label>

<select id="department">
<option value="">Select Department</option>
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
</select>

<div class="error" id="departmentError"></div>

</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
<div class="error" id="dobError"></div>
</div>

<button type="submit">Register</button>

<div class="success" id="successMsg"></div>

</form>

</div>

<script>

document.getElementById("regForm").addEventListener("submit",function(e){

e.preventDefault();

document.querySelectorAll(".error").forEach(function(item){
item.innerHTML="";
});

document.getElementById("successMsg").innerHTML="";

let valid=true;

let name=document.getElementById("name").value.trim();
let roll=document.getElementById("roll").value.trim();
let email=document.getElementById("email").value.trim();
let mobile=document.getElementById("mobile").value.trim();
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;
let department=document.getElementById("department").value;
let dob=document.getElementById("dob").value;

let gender=document.querySelector('input[name="gender"]:checked');

if(name===""){
document.getElementById("nameError").innerHTML="Full Name is required";
valid=false;
}

let rollPattern=/^[A-Za-z0-9]+$/;

if(!rollPattern.test(roll)){
document.getElementById("rollError").innerHTML="Roll Number must contain only letters and numbers";
valid=false;
}

let emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailPattern.test(email)){
document.getElementById("emailError").innerHTML="Enter a valid Email ID";
valid=false;
}

let mobilePattern=/^[0-9]{10}$/;

if(!mobilePattern.test(mobile)){
document.getElementById("mobileError").innerHTML="Mobile Number must contain exactly 10 digits";
valid=false;
}

if(password.length<8){
document.getElementById("passwordError").innerHTML="Password must be at least 8 characters";
valid=false;
}

if(password!==confirm){
document.getElementById("confirmPasswordError").innerHTML="Passwords do not match";
valid=false;
}

if(!gender){
document.getElementById("genderError").innerHTML="Please select Gender";
valid=false;
}

if(department===""){
document.getElementById("departmentError").innerHTML="Please select Department";
valid=false;
}

if(dob===""){
document.getElementById("dobError").innerHTML="Please select Date of Birth";
valid=false;
}

if(valid){
document.getElementById("successMsg").innerHTML="Student Registration Successful!";
document.getElementById("regForm").reset();
}

});

</script>

</body>
</html>
